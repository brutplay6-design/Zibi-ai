name: Zibi Bot Server

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: # Permite pornirea manuală cu un buton

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Actualizat de la v3

    - name: Set up Python
      uses: actions/setup-python@v5 # Actualizat de la v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI

    - name: Run Zibi Bot
      env:
        PYTHONUNBUFFERED: 1
        # Activăm Node 24 pentru a scăpa de Warning-ul galben
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      run: python zibi.py
