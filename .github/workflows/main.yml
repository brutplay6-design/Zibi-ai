# Salvează acest fișier în folderul: .github/workflows/main.yml
name: Zibi Bot Neuronal

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite pornirea manuala din butonul "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descarca codul
        uses: actions/checkout@v3

      - name: Instaleaza Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instaleaza dependintele
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Porneste pe Zibi
        env:
          PYTHONUNBUFFERED: 1
        run: python zibi_bot.py
